name = "burnage-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"
workers_dev = false
preview_urls = false

# One Durable Object instance per user_hash. Each instance gets its own
# private SQLite database (via `state.storage().sql()`). No provisioning —
# the first request with a given name materializes the DO + its DB.
[[durable_objects.bindings]]
name = "USER_STORE"
class_name = "UserStore"

# SQLite-backed DOs require `new_sqlite_classes` (not `new_classes`).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserStore"]

# Workers AI: used for embedding turn text (qwen3-embedding-0.6b, 1024 dims).
[ai]
binding = "AI"

# Vectorize: shared semantic index. Per-user isolation is a Vectorize
# `namespace` (namespace=<user_hash>) on every upsert/query — hard partition,
# not a metadata filter. The id prefix (`{user_hash}:{tx_id}`) remains as a
# uniqueness guard within the index. Provision once: `just vectorize-create`.
[[vectorize]]
binding = "VECTORIZE"
index_name = "burnage"

# Shared with the dashboard worker. Keys are namespaced by prefix:
#   tok:<token_id>     bearer → "{uuid}|{email}", TTL 1h (auth cache)
#   link:<email>       CF Access email → user_hash (dashboard scoping)
[[kv_namespaces]]
binding = "SESSION"
id = "0217e705fa5f4ce7843f7ce7cbcf4f10"

# Transparent upstream-retry knobs. The worker retries a request to
# api.anthropic.com when it returns a retryable status (524 origin timeout,
# 5xx, 529 overloaded) or the subrequest itself fails — but only before any
# bytes have streamed to the client, so the retry is invisible. Unset → code
# defaults (2 retries, 500ms base, exponential backoff). Uncomment to override.
# [vars]
# UPSTREAM_MAX_RETRIES = "2"     # capped at 5
# UPSTREAM_RETRY_BASE_MS = "500" # capped at 10000; delay = base * 2^attempt

[build]
# Prepend ~/.cargo/bin so rustup-installed `cargo` and the freshly
# `cargo install`ed `worker-build` resolve in fresh deploy shells
# (e.g. Cloudflare Workers Builds) where ~/.cargo/bin is not on PATH.
# Local dev and mise-managed shells already have it on PATH, so this
# is a no-op there.
command = "export PATH=\"$HOME/.cargo/bin:$PATH\" && cargo install -q \"worker-build@^0.8\" && worker-build --release"

# Cloudflare caps cpu_ms at 300000 (5 min) for fetch handlers on the paid plan.
# This is the highest value allowed; 15 min isn't supported for fetch handlers.
[limits]
cpu_ms = 300000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[dev]
port = 8787
